name: cache-toggle
runs_dir: ../runs/cache-toggle

defaults:
  provider: vllm
  model: openai-community/gpt2
  traffic_type: constant
  traffic_volume: 3

  prompt_between_run: true

comparison:
  title: Cache Toggle Comparison
  output: ../runs/cache-toggle/cache-toggle-comparison.png
  metrics:
    - tokens_per_second
    - avg_ttft_seconds
    - avg_request_latency_seconds
    - error_rate_percent

runs:
  - name: hf-cache-off-input-500
    input_size_tokens: 500
    prompt_after_run: Enable caching, then press any key to start the next run.
  - name: hf-cache-on-input-500
    input_size_tokens: 500
  - name: my-cache-off
    input_size_tokens: 500
    prompt_after_run: Enable caching, then press any key to start the next run.
  - name: my-cache-on
    input_size_tokens: 500
